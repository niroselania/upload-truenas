services:
  truenas-uploader:
    image: nginx:1.27-alpine
    container_name: truenas-uploader
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      APP_INDEX_URL: "https://raw.githubusercontent.com/niroselania/truenas-uploader/main/index.html"
    command:
      - /bin/sh
      - -c
      - |
        wget -O /usr/share/nginx/html/index.html "$$APP_INDEX_URL"
        printf '%s\n' \
          'server {' \
          '    listen 80;' \
          '    server_name _;' \
          '    root /usr/share/nginx/html;' \
          '    index index.html;' \
          '    client_max_body_size 0;' \
          '    location / {' \
          '        try_files $$uri $$uri/ /index.html;' \
          '    }' \
          '    location /truenas/_upload/ {' \
          '        proxy_pass http://192.168.1.120/_upload/;' \
          '        proxy_http_version 1.1;' \
          '        proxy_request_buffering off;' \
          '        proxy_buffering off;' \
          '        proxy_read_timeout 3600s;' \
          '        proxy_send_timeout 3600s;' \
          '        proxy_set_header Host 192.168.1.120;' \
          '        proxy_set_header X-Real-IP $$remote_addr;' \
          '        proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;' \
          '        proxy_set_header X-Forwarded-Proto $$scheme;' \
          '    }' \
          '}' > /etc/nginx/conf.d/default.conf
        nginx -g 'daemon off;'

services:
  truenas-uploader:
    image: nginx:1.27-alpine
    container_name: truenas-uploader
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    command: >
      sh -c "cp /usr/share/nginx/html/nginx.conf /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
